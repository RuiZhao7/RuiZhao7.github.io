# 作品集数据 —— 记者外链 clips
#
# 每条作品的字段说明(接口契约):
#   title    : 必填。报道标题
#   outlet   : 必填。发表媒体名(如 财新、南方周末)
#   date     : 必填。发表日期 YYYY-MM-DD,用于同一领域内倒序排列
#   url      : 必填。原文外链
#   beat     : 必填。报道领域,相同 beat 的作品会归到同一分区
#   dek      : 可选。一句话导语 / 内容简介
#   image    : 可选。缩略图路径(如 /assets/img/works/xxx.jpg);缺省则渲染纯文字卡片
#   featured : 可选。设为 true 标记代表作(显示「代表作」标签)
#
# 添加新作品只需在此追加条目,无需改动模板。
# 下面 3 条为占位样例,替换成你的真实作品即可。

