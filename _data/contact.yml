#  The contact options.
#  侧边栏底部图标。当前仅启用邮箱 + GitHub(站点宿主)。
#  微信无 URL,不适合做图标链接,已放在「关于」页文字展示。

- type: email
  icon: "fas fa-envelope"
  noblank: true # open link in current tab

- type: github
  icon: "fab fa-github"

